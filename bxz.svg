<!-- bxz.svg - Vector icon for BXZ language -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#667eea"/>
            <stop offset="100%" style="stop-color:#764ba2"/>
        </linearGradient>
    </defs>
    
    <!-- Background -->
    <rect width="512" height="512" rx="100" ry="100" fill="url(#grad)"/>
    
    <!-- Border -->
    <rect x="20" y="20" width="472" height="472" rx="80" ry="80" fill="none" stroke="white" stroke-width="8" stroke-opacity="0.3"/>
    
    <!-- Angle brackets - left -->
    <polyline points="180,150 120,256 180,362" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Angle brackets - right -->
    <polyline points="332,150 392,256 332,362" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- BXZ Text -->
    <text x="256" y="450" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="10">
        BXZ
    </text>
    
    <!-- Small decorative dots -->
    <circle cx="256" cy="50" r="8" fill="white" opacity="0.5"/>
    <circle cx="50" cy="256" r="8" fill="white" opacity="0.5"/>
    <circle cx="462" cy="256" r="8" fill="white" opacity="0.5"/>
</svg>